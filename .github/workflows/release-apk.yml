name: Release APK

on:
  push:
    tags:
      - 'apk-*'

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Validate tag and version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^apk-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Tag must match apk-x.y.z. Got: $TAG_NAME"
            exit 1
          fi

          TAG_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          GRADLE_VERSION="$(sed -n 's/.*versionName "\([^\"]*\)".*/\1/p' android/app/build.gradle | head -n 1)"

          if [[ "$PACKAGE_VERSION" != "$GRADLE_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) does not match android/app/build.gradle versionName ($GRADLE_VERSION)"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match code version ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run generate

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Prepare signing files
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail

          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?Missing secret ANDROID_RELEASE_KEYSTORE_BASE64}"
          : "${ANDROID_RELEASE_STORE_PASSWORD:?Missing secret ANDROID_RELEASE_STORE_PASSWORD}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?Missing secret ANDROID_RELEASE_KEY_ALIAS}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?Missing secret ANDROID_RELEASE_KEY_PASSWORD}"

          KEYSTORE_PATH="$RUNNER_TEMP/android-release.keystore"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_RELEASE_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

          if [[ -n "${GOOGLE_SERVICES_JSON_BASE64:-}" ]]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ env.ANDROID_RELEASE_STORE_FILE }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "Expected APK not found at $APK_PATH"
            exit 1
          fi

          RELEASE_APK="$RUNNER_TEMP/nembestil-pos3-app-${{ steps.version.outputs.tag_version }}.apk"
          cp "$APK_PATH" "$RELEASE_APK"
          echo "apk_path=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: APK ${{ steps.version.outputs.tag_version }}
          generate_release_notes: true
          files: ${{ steps.asset.outputs.apk_path }}
          fail_on_unmatched_files: true
          overwrite_files: true
